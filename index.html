        const { Illustration, Group, Anchor, Rect, TAU, Ellipse } = Zdog;
        const canvasElement = document.querySelector('.zdog-canvas');
        const illustration = new Illustration({
            element: canvasElement,
            dragRotate: true,
            zoom: 0.35, // Ridimensionato per la Navbar
        });

        const dice = new Anchor({ addTo: illustration });
        const faces = new Group({ addTo: dice });

        // Colore Blu Tailwind (uguale a text-blue-600)
        const diceColor = '#2563eb';

        const face = new Rect({
            addTo: faces,
            stroke: 50,
            width: 50,
            height: 50,
            color: diceColor,
            translate: { z: -25 },
        });

        face.copy({ rotate: { x: TAU / 4 }, translate: { y: 25 } });
        face.copy({ rotate: { x: TAU / 4 }, translate: { y: -25 } });
        face.copy({ translate: { z: 25 } });

        const one = new Ellipse({
            addTo: dice,
            diameter: 15,
            stroke: false,
            fill: true,
            color: 'hsl(0, 0%, 100%)',
            translate: { z: 50 },
        });

        const two = new Group({ addTo: dice, rotate: { x: TAU / 4 }, translate: { y: 50 } });
        one.copy({ addTo: two, translate: { y: 20 } });
        one.copy({ addTo: two, translate: { y: -20 } });

        const three = new Group({ addTo: dice, rotate: { y: TAU / 4 }, translate: { x: 50 } });
        one.copy({ addTo: three, translate: { z: 0 } });
        one.copy({ addTo: three, translate: { x: 20, y: -20, z: 0 } });
        one.copy({ addTo: three, translate: { x: -20, y: 20, z: 0 } });

        const four = new Group({ addTo: dice, rotate: { y: TAU / 4 }, translate: { x: -50 } });
        two.copyGraph({ addTo: four, rotate: { x: 0 }, translate: { x: 20, y: 0 } });
        two.copyGraph({ addTo: four, rotate: { x: 0 }, translate: { x: -20, y: 0 } });

        const five = new Group({ addTo: dice, rotate: { x: TAU / 4 }, translate: { y: -50 } });
        four.copyGraph({ addTo: five, rotate: { y: 0 }, translate: { x: 0 } });
        one.copy({ addTo: five, translate: { z: 0 } });

        const six = new Group({ addTo: dice, translate: { z: -50 } });
        two.copyGraph({ addTo: six, rotate: { x: 0, z: TAU / 4 }, translate: { x: 0, y: 0 } });
        four.copyGraph({ addTo: six, rotate: { y: 0 }, translate: { x: 0 } });

        function animateDice() {
            illustration.updateRenderGraph();
            dice.rotate.x += 0.005;
            dice.rotate.y -= 0.01;
            requestAnimationFrame(animateDice);
        }
        animateDice();

        function updateLanguageFlags() {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('lang-active');
                btn.classList.add('lang-inactive');
            });
            document.getElementById(`lang-${currentLanguage}`).classList.remove('lang-inactive');
            document.getElementById(`lang-${currentLanguage}`).classList.add('lang-active');

            document.getElementById('nav-home').innerText = currentLanguage === 'fr' ? 'Accueil' : 'Home';
            document.getElementById('mob-nav-home').innerText = currentLanguage === 'fr' ? 'Accueil' : 'Home';
            document.getElementById('footer-text').innerText = uiData[currentLanguage].footer;
        }

        function navigate(page) {
            mobileMenu.classList.add('hidden');
            window.scrollTo(0, 0);
            currentPage = page;

            if (page === 'home') {
                renderHome();
            } else {
                renderPitch(page);
            }
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            updateLanguageFlags();
            if (currentPage === 'home') {
                renderHome();
            } else {
                renderPitch(currentPage);
            }
        }
